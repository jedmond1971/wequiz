{% extends "base.html" %}
{% block title %}WeQuiz — Join a Game{% endblock %}

{% block body %}
<div class="page">
  <div class="logo">We<span>Quiz</span></div>
  <p class="home-subtitle">The live quiz game for everyone!</p>

  <div class="card">
    <h2>Join a Game</h2>
    <form id="join-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="room-code">Room Code</label>
        <input id="room-code" type="text" placeholder="e.g. ABC123"
               maxlength="6" autocapitalize="characters" autocorrect="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label for="nickname">Nickname</label>
        <input id="nickname" type="text" placeholder="Your name" maxlength="20">
      </div>
      <div id="join-error" class="error-msg hidden"></div>
      <div style="height:12px"></div>
      <button type="submit" class="btn btn-success btn-full btn-lg" id="join-btn">
        Join Game →
      </button>
    </form>
  </div>

  <p class="home-admin-link">Hosting a quiz? <a href="/admin">Go to Admin Panel</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
  const form = document.getElementById('join-form');
  const errEl = document.getElementById('join-error');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const code = document.getElementById('room-code').value.trim().toUpperCase();
    const nick = document.getElementById('nickname').value.trim();
    if (!code || !nick) {
      showError('Please enter both a room code and a nickname.');
      return;
    }
    const params = new URLSearchParams({ code, nick });
    window.location.href = `/play?${params}`;
  });

  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.remove('hidden');
  }
</script>
{% endblock %}
